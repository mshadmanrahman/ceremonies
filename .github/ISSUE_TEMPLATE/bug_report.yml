name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: "When I click X, Y happens instead of Z."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to /estimation/abc123
        2. Click "Reveal votes"
        3. See error
    validations:
      required: true
  - type: dropdown
    id: ceremony
    attributes:
      label: Which ceremony?
      options:
        - Estimation
        - Retro
        - Dashboard
        - Landing page
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, browser, OS, etc.
      placeholder: "Chrome 146, macOS, dark mode"
    validations:
      required: false
